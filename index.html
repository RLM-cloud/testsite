<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Static Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      background: #020617;
      padding: 20px;
      text-align: center;
    }
    nav a {
      margin: 0 10px;
      color: #38bdf8;
      text-decoration: none;
    }
    .hero {
      padding: 60px 20px;
      text-align: center;
    }
    .hero h1 {
      font-size: 2.5rem;
    }
    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .card {
      background: #020617;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Website</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>  <section class="hero">
    <h1>Welcome 🚀</h1>
    <p>This is your static website. Clean, fast, no backend.</p>
  </section>  <div class="container">
    <div class="card" id="about">
      <h2>About</h2>
      <p>I build cool stuff with HTML, CSS, and JavaScript.</p>
    </div><div class="card" id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</div>

  </div>  <footer>
    <p>© 2026 My Website</p>
  </footer>
</body>
</html>
